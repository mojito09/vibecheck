name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-and-build:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: vibecheck
          POSTGRES_PASSWORD: vibecheck_dev
          POSTGRES_DB: vibecheck
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U vibecheck"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://vibecheck:vibecheck_dev@localhost:5432/vibecheck?schema=public
      REDIS_URL: redis://localhost:6379
      NEXTAUTH_SECRET: ci-test-secret

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - run: npx prisma generate

      - run: npx prisma migrate deploy

      - run: npm run lint

      - run: npm run build
